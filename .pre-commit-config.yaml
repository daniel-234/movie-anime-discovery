repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --extend-select=I]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false