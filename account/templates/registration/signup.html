{% extends "base.html" %}

{% block content %}
<div class="min-h-screen grid place-items-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Sign up</h2>
    <p class="text-sm text-gray-600 mb-6">Create an account to get started:</p>

    <form method="post" class="grid gap-4">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
            {{ field.label }}
          </label>
          {{ field }}
          {% for error in field.errors %}
            <p class="text-sm text-red-600 mt-1">{{ error }}</p>
          {% endfor %}
        </div>
      {% endfor %}

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition">
        Sign up
      </button>
    </form>

    <p class="text-sm text-gray-600 mt-6 text-center">
      Already have an account?
      <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
