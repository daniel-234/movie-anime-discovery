{% extends "base.html" %}

{% block content %}
<div class="min-h-screen grid place-items-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white p-8 rounded-lg shadow-md">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome back</h1>
      <p class="text-sm text-gray-600 mb-6">Log in to access your bookmarks.</p>

      <form method="post" class="grid gap-4">
        {% csrf_token %}

        <div>
          <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          {{ form.username }}
        </div>

        <div>
          <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          {{ form.password }}
        </div>

        {% if form.non_field_errors %}
          <div class="text-sm text-red-600">{{ form.non_field_errors }}</div>
        {% endif %}

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition">
          Log in
        </button>
      </form>
    </div>

    <p class="text-sm text-gray-600 mt-6 text-center">
      Don't have an account?
      <a href="{% url 'signup' %}" class="text-blue-600 hover:underline font-medium">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
