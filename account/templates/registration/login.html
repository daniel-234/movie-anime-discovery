{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Log in</h2>
    <p class="text-sm text-gray-600 mb-6">Please use the following form to log in:</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          Username
        </label>
        {{ form.username }}
      </div>

      <div>
        <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        {{ form.password }}
      </div>

      {% if form.errors %}
        <p class="text-sm text-red-600">Invalid username or password.</p>
      {% endif %}

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition">
        Log in
      </button>
    </form>

  </div>
</div>
{% endblock %}
