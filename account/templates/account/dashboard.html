{% extends "base.html" %}

{% block content %}
<div class="min-h-screen grid place-items-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Dashboard</h1>
    <p class="text-sm text-gray-600 mb-6">Welcome back, {{ user.first_name|default:user.username }}.</p>

    {% if messages %}
      <div class="grid gap-2 mb-6">
        {% for message in messages %}
          <p class="text-sm p-3 rounded {% if message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
            {{ message }}
          </p>
        {% endfor %}
      </div>
    {% endif %}

    <div class="grid gap-3">
      <a href="{% url 'edit_profile' %}" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded transition text-center">
        Edit profile
      </a>
    </div>
  </div>
</div>
{% endblock %}
