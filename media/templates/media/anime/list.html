{% extends "media/base.html" %}
{% block title %}Anime{% endblock %}
{% block content %}
  <h1>Anime</h1>

  <ul>
    {% for anime in anime_list %}
      <li>
        <a href="{% url 'media:anime_detail' anime.id %}">
            {{ anime.title }}
        </a>
      </li>
    {% endfor %}
    </ul>        
{% endblock %}
