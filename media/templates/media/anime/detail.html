{% extends "base.html" %}
{% block title %}{{ anime.title }}{% endblock %}
{% block content %}
    <div>
        <h1>{{ anime.title }}</h1>
        <img class="w-64 object-cover rounded-lg" src="{{ anime.cover_image }}" alt="{{ anime.title }}">
        {{ anime.country_of_origin }}
        {% include "media/save_button.html" with content_type="anime" object_id=anime.pk %}
    </div>    
{% endblock %}
