{% extends "media/base.html" %}
{% block title %}Movies{% endblock %}
{% block content %}
  <h1>Movies</h1>

  <ul>
    {% for movie in movies %}
      <li>
        <a href="{% url 'media:movie_detail' movie.id %}">
            {{ movie.title }}
        </a>
      </li>
    {% endfor %}
    </ul>        
{% endblock %}
