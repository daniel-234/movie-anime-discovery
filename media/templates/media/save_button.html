{% if user.is_authenticated %}
  {% if is_saved %}
    <form method="post" action="{% url 'media:unsave' content_type object_id %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      <button type="submit"
              class="px-4 py-2 rounded-md bg-gray-100 hover:bg-red-100 text-gray-800 hover:text-red-700 transition">
        Saved ✓ <span class="text-sm opacity-70">(click to unsave)</span>
      </button>
    </form>
  {% else %}
    <form method="post" action="{% url 'media:save' content_type object_id %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      <button type="submit"
              class="px-4 py-2 rounded-md bg-blue-600 hover:bg-blue-700 text-white transition">
        Save
      </button>
    </form>
  {% endif %}
{% else %}
  <a href="{% url 'login' %}?next={{ request.path }}"
     class="px-4 py-2 rounded-md border border-gray-300 hover:bg-gray-50 text-gray-700 transition">
    Log in to save
  </a>
{% endif %}
